pdf:
  path: /Users/jaesolshin/Documents/GitHub/icarus/pdf/grossberg_ch4.pdf

storage:
  working_dir: ./data/rag_storage
  output_dir: ./data/output

models:
  llm: gemini-3.5-flash              # KG extraction + keyword extraction
  vision: gemini-3.1-flash-lite      # image description — fast, large-volume
  embedding: gemini-embedding-2
  embedding_dim: 3072
  embedding_max_tokens: 8191
  embedding_concurrency: 8           # max concurrent embedding calls (429 guard; backoff retry absorbs the rest)
  answer:
    provider: gemini                 # openai | gemini  (--provider CLI flag overrides)
    openai: gpt-5.5                  # OpenAI Responses API + reasoning summary streaming
    gemini: gemini-3.1-pro-preview   # Gemini streamGenerateContent + thought parts streaming
    system_prompt: prompts/answer_system.md   # style guide prepended to LightRAG sys_prompt
    vision_models: [gpt-5.5, gemini-3.1-pro-preview]  # answer models that accept image input

parser:
  engine: mineru
  method: auto
  enable_image: true
  enable_table: true
  enable_equation: true

query:
  default_mode: hybrid
  inject_images: true              # re-inject relevant figure pixels into the answer model at query time
  max_injected_images: 5           # cap K for the relevance gate
  image_gate_model: gemini-3.1-flash-lite   # cheap classifier that picks query-relevant images
  hybrid_seed: false               # union BM25 lexical entity seeds with LightRAG's vector seeds (needs python-mecab-ko)
  hybrid_seed_top_k: 10            # BM25 entity candidates unioned per query
  expand_keywords: false           # expand query -> corpus-language hl/ll keywords before retrieval
  expand_lang: auto                # auto-detect corpus language from the index, or pin: en | ko | ja | zh
  # expand_model: gemini-3.1-flash-lite   # optional; defaults to router.model

agent:
  max_tool_rounds: 4          # safety cap on tool-call iterations per query
  web_search: true            # include OpenAI built-in web_search_preview tool
                              # Phase-2 TODO: replace with custom Tavily function
                              # tool to enable summarisation middleware on raw results

router:
  enabled: true
  model: gemini-3.1-flash-lite     # cheap front-of-pipeline classifier; thinking disabled
  # The router emits an abstract effort level; each provider realizes it differently.
  # OpenAI uses the string via reasoning.effort. Gemini maps it to a thinking_budget:
  thinking_budget:
    low: 512
    medium: 4096
    high: -1                       # -1 = dynamic (model decides)
